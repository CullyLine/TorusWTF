# Litestream config — continuous SQLite replication to MinIO.
#
# Recovers the DB on disaster:
#   litestream restore -o /var/lib/torus/torus.db s3://torus-backups/torus.db
#
# Override LITESTREAM_ACCESS_KEY_ID / LITESTREAM_SECRET_ACCESS_KEY via env vars.

dbs:
  - path: /var/lib/torus/torus.db
    replicas:
      - type: s3
        endpoint: http://minio:9000
        bucket: torus-backups
        path: torus.db
        region: us-east-1
        force-path-style: true
        sync-interval: 1s
        snapshot-interval: 24h
        retention: 720h
