# torus.fm — production stack for self-hosting
#
# Bind-mounts your 8TB drive for MinIO data + SQLite + backups.
# Adds Caddy for auto-HTTPS, Litestream for continuous SQLite replication, and
# runs the Next.js web app + BullMQ worker as containers.
#
# Customize:
#   - TORUS_DRIVE_PATH — path to your data drive (default: /mnt/torus-8tb)
#   - DOMAIN          — your public domain (default: torus.fm)
#   - LETSENCRYPT_EMAIL
#
# Deploy:
#   docker compose -f docker-compose.prod.yml up -d
#
# Update (with Watchtower):
#   Watchtower will auto-pull `latest` tagged images and gracefully restart.

name: torus-prod

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: file:/var/lib/torus/torus.db
  REDIS_URL: redis://redis:6379
  STORAGE_DRIVER: minio
  STORAGE_BUCKET: torus-clips
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_REGION: us-east-1
  STORAGE_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
  STORAGE_PUBLIC_URL: https://media.${DOMAIN:?set DOMAIN}/torus-clips
  PUBLIC_URL: https://${DOMAIN:?set DOMAIN}
  SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ${TORUS_DRIVE_PATH:-/mnt/torus-8tb}/redis:/data
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - ${TORUS_DRIVE_PATH:-/mnt/torus-8tb}/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  # Continuous SQLite replication. Writes every change to the configured
  # Storage driver. To restore: `litestream restore -o /var/lib/torus/torus.db ...`
  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ${TORUS_DRIVE_PATH:-/mnt/torus-8tb}/sqlite:/var/lib/torus
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ['replicate']
    environment:
      LITESTREAM_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:?}
      LITESTREAM_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:?}
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  web:
    image: ghcr.io/${GITHUB_REPO_OWNER:-yourorg}/torus-web:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *common-env
    volumes:
      - ${TORUS_DRIVE_PATH:-/mnt/torus-8tb}/sqlite:/var/lib/torus
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  worker:
    image: ghcr.io/${GITHUB_REPO_OWNER:-yourorg}/torus-worker:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *common-env
    volumes:
      - ${TORUS_DRIVE_PATH:-/mnt/torus-8tb}/sqlite:/var/lib/torus
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - minio

  # Auto-update containers from :latest tag (opt out: remove labels)
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --schedule "0 0 4 * * *"

volumes:
  caddy-data:
  caddy-config:
