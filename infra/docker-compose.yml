# torus.fm — local development stack
# Brings up Redis, MinIO, and mailhog (fake SMTP) for hacking on the app locally.
# The Next.js web app and the worker run on your host (`pnpm dev`).
#
#   docker compose up -d
#
# When you're done:
#   docker compose down

name: torus-dev

services:
  redis:
    image: redis:7-alpine
    container_name: torus-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: torus-minio
    restart: unless-stopped
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console (http://localhost:9001, admin/minioadmin)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5

  # Creates the `torus-clips` bucket on startup so the app finds it ready.
  minio-init:
    image: minio/mc:latest
    container_name: torus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/torus-clips &&
      mc anonymous set download local/torus-clips &&
      echo 'Bucket torus-clips ready';
      "
    restart: 'no'

  # Fake SMTP for testing magic-link emails. http://localhost:8025 to view caught mail.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: torus-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI

volumes:
  redis-data:
  minio-data:
